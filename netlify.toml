[build]
  command = "npm run build"
    functions = "netlify/functions"

    [build.environment]
      NODE_VERSION = "20"
        NPM_VERSION = "10"

              [[headers]]
                for = "/_next/static/*"
                  [headers.values]
                      Cache-Control = "public, max-age=31536000, immutable"

                      [[headers]]
                        for = "/static/*"
                          [headers.values]
                              Cache-Control = "public, max-age=31536000, immutable"

                              [[plugins]]
                                package = "@netlify/plugin-nextjs"
