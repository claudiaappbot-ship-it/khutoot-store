[build]
command = "npm run build"
publish = ".next/standalone"

[build.environment]
NODE_VERSION = "20"
NPM_VERSION = "18"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
